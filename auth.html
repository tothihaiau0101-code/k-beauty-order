<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO: Primary -->
  <title>Đăng Nhập / Đăng Ký — BeaPop</title>
  <meta name="title" content="Đăng Nhập / Đăng Ký — BeaPop">
  <meta name="description" content="Đăng nhập hoặc đăng ký tài khoản BeaPop để mua hàng và tích điểm">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="BeaPop">
  <meta property="og:locale" content="vi_VN">
  <meta property="og:url" content="https://beapop.pages.dev/auth.html">
  <meta property="og:title" content="Đăng Nhập / Đăng Ký — BeaPop">
  <meta property="og:description" content="Đăng nhập hoặc đăng ký tài khoản BeaPop để mua hàng và tích điểm">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
  <meta name="theme-color" content="#d63384">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap&subset=vietnamese,latin">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap&subset=vietnamese,latin" media="print" onload="this.media='all'">

  <style>
    :root {
      --bg-primary: #f8f8f8;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b7b;
      --text-muted: #9a9aaa;
      --accent-green: #1a8a5e;
      --accent-purple: #7c3aed;
      --border: rgba(0, 0, 0, 0.08);
      --gradient-primary: linear-gradient(135deg, #1a8a5e 0%, #7c3aed 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .auth-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0 0 8px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Tab Switcher */
    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: rgba(0, 0, 0, 0.03);
      padding: 4px;
      border-radius: 12px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .auth-tab:hover:not(.active) {
      background: rgba(0, 0, 0, 0.05);
    }

    /* Form Styles */
    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.03);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent-purple);
      background: rgba(0, 0, 0, 0.05);
    }

    .input-group input::placeholder {
      color: var(--text-muted);
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: var(--gradient-primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-auth:hover {
      opacity: 0.9;
    }

    .btn-auth:active {
      transform: scale(0.98);
    }

    .btn-auth:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
      text-align: center;
    }

    .success-msg {
      color: var(--accent-green);
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
      text-align: center;
    }

    /* Footer Links */
    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--accent-purple);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      padding: 0 12px;
    }

    /* Password requirements */
    .password-requirements {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-container {
        margin: 20px;
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>🇰🇷 BeaPop</h1>
      <p>Chào mừng bạn đến với BeaPop</p>
    </div>

    <!-- Tab Switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Đăng Nhập</button>
      <button class="auth-tab" onclick="switchTab('register')">Đăng Ký</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label for="loginPhone">Số điện thoại</label>
        <input type="tel" id="loginPhone" placeholder="Nhập số điện thoại..." required pattern="^0[0-9]{9}$">
      </div>

      <div class="input-group">
        <label for="loginPassword">Mật khẩu</label>
        <input type="password" id="loginPassword" placeholder="Nhập mật khẩu..." required minlength="4">
      </div>

      <button type="submit" class="btn-auth" id="loginBtn">Đăng Nhập</button>
      <div class="error-msg" id="loginError"></div>
      <div class="success-msg" id="loginSuccess"></div>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
      <div class="input-group">
        <label for="registerName">Họ tên</label>
        <input type="text" id="registerName" placeholder="Nhập họ tên..." required minlength="2">
      </div>

      <div class="input-group">
        <label for="registerPhone">Số điện thoại</label>
        <input type="tel" id="registerPhone" placeholder="Nhập số điện thoại..." required pattern="^0[0-9]{9}$">
      </div>

      <div class="input-group">
        <label for="registerPassword">Mật khẩu</label>
        <input type="password" id="registerPassword" placeholder="Tạo mật khẩu..." required minlength="4">
        <div class="password-requirements">Tối thiểu 4 ký tự</div>
      </div>

      <div class="input-group">
        <label for="registerConfirm">Xác nhận mật khẩu</label>
        <input type="password" id="registerConfirm" placeholder="Nhập lại mật khẩu..." required minlength="4">
      </div>

      <button type="submit" class="btn-auth" id="registerBtn">Đăng Ký</button>
      <div class="error-msg" id="registerError"></div>
      <div class="success-msg" id="registerSuccess"></div>
    </form>

    <div class="auth-footer">
      <p>Quay lại <a href="catalog.html">trang mua hàng</a></p>
    </div>
  </div>

  <script>
    const API_BASE = 'https://beapop-api.beapop.workers.dev';

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

      if (tab === 'login') {
        document.querySelector('.auth-tab:first-child').classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelector('.auth-tab:last-child').classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }

      // Clear messages
      document.querySelectorAll('.error-msg, .success-msg').forEach(el => {
        el.style.display = 'none';
        el.textContent = '';
      });
    }

    // Phone validation (Vietnamese format)
    function validatePhone(phone) {
      const cleaned = phone.replace(/[^0-9]/g, '');
      return /^0[0-9]{9}$/.test(cleaned);
    }

    // Login handler
    async function handleLogin(event) {
      event.preventDefault();

      const phone = document.getElementById('loginPhone').value.replace(/[^0-9]/g, '');
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      const successEl = document.getElementById('loginSuccess');

      // Validate
      if (!validatePhone(phone)) {
        errorEl.textContent = 'Số điện thoại không hợp lệ (cần 10 số, bắt đầu bằng 0)';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 4) {
        errorEl.textContent = 'Mật khẩu phải có ít nhất 4 ký tự';
        errorEl.style.display = 'block';
        return;
      }

      // Submit
      btn.disabled = true;
      btn.textContent = 'Đang kiểm tra...';
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          // Store token and user data
          localStorage.setItem('customerToken', data.token);
          localStorage.setItem('customerUser', JSON.stringify(data.user));

          successEl.textContent = 'Đăng nhập thành công! Đang chuyển...';
          successEl.style.display = 'block';

          // Redirect after short delay
          setTimeout(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect') || 'account.html';
            window.location.href = redirect;
          }, 1000);
        } else {
          errorEl.textContent = data.error || 'Đăng nhập thất bại. Vui lòng kiểm tra lại thông tin.';
          errorEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.textContent = 'Không thể kết nối đến server. Vui lòng thử lại sau.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Đăng Nhập';
      }
    }

    // Register handler
    async function handleRegister(event) {
      event.preventDefault();

      const name = document.getElementById('registerName').value.trim();
      const phone = document.getElementById('registerPhone').value.replace(/[^0-9]/g, '');
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirm').value;
      const btn = document.getElementById('registerBtn');
      const errorEl = document.getElementById('registerError');
      const successEl = document.getElementById('registerSuccess');

      // Validate
      if (name.length < 2) {
        errorEl.textContent = 'Họ tên phải có ít nhất 2 ký tự';
        errorEl.style.display = 'block';
        return;
      }

      if (!validatePhone(phone)) {
        errorEl.textContent = 'Số điện thoại không hợp lệ (cần 10 số, bắt đầu bằng 0)';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 4) {
        errorEl.textContent = 'Mật khẩu phải có ít nhất 4 ký tự';
        errorEl.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        errorEl.textContent = 'Mật khẩu xác nhận không khớp';
        errorEl.style.display = 'block';
        return;
      }

      // Submit
      btn.disabled = true;
      btn.textContent = 'Đang tạo tài khoản...';
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          // Store token and user data
          localStorage.setItem('customerToken', data.token);
          localStorage.setItem('customerUser', JSON.stringify(data.user));

          successEl.textContent = 'Đăng ký thành công! Đang chuyển...';
          successEl.style.display = 'block';

          // Redirect after short delay
          setTimeout(() => {
            window.location.href = 'account.html';
          }, 1000);
        } else {
          errorEl.textContent = data.error || 'Đăng ký thất bại. Số điện thoại có thể đã được sử dụng.';
          errorEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.textContent = 'Không thể kết nối đến server. Vui lòng thử lại sau.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Đăng Ký';
      }
    }

    // Check if already logged in
    (function() {
      const token = localStorage.getItem('customerToken');
      if (token) {
        // Already logged in, redirect to account
        window.location.href = 'account.html';
      }
    })();
  </script>
</body>
</html>

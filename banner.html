<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Beauty Price Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0f0f0f;
    font-family: 'Inter', -apple-system, sans-serif;
  }

  .banner {
    width: 540px;
    background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 24px;
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 80px rgba(228, 63, 90, 0.08);
  }

  /* Decorative glow orbs */
  .banner::before {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(228, 63, 90, 0.25) 0%, transparent 70%);
    border-radius: 50%;
  }

  .banner::after {
    content: '';
    position: absolute;
    bottom: -40px;
    left: -40px;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(0, 210, 140, 0.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  .content {
    position: relative;
    z-index: 2;
  }

  /* Top badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(228, 63, 90, 0.15);
    border: 1px solid rgba(228, 63, 90, 0.3);
    color: #ff6b8a;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 50px;
    margin-bottom: 28px;
  }

  .badge::before { content: '🇰🇷'; }

  /* Product name */
  .product-name {
    font-size: 32px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .product-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  /* Price comparison card */
  .price-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 28px 24px;
    margin-bottom: 24px;
    backdrop-filter: blur(10px);
  }

  .price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .price-label {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
  }

  .price-shopee {
    font-size: 24px;
    font-weight: 700;
    color: rgba(255,255,255,0.25);
    text-decoration: line-through;
    text-decoration-color: rgba(228, 63, 90, 0.6);
    text-decoration-thickness: 2px;
  }

  .price-row-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .price-label-main {
    font-size: 14px;
    font-weight: 700;
    color: rgba(0, 210, 140, 0.8);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .price-shop {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, #00d28c, #00e89d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  /* Savings banner */
  .savings {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, rgba(0, 210, 140, 0.12), rgba(0, 232, 157, 0.08));
    border: 1px solid rgba(0, 210, 140, 0.2);
    border-radius: 14px;
    padding: 16px 24px;
    margin-bottom: 28px;
  }

  .savings-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #00d28c, #00e89d);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .savings-text {
    font-size: 16px;
    font-weight: 700;
    color: #00e89d;
  }

  .savings-amount {
    font-size: 20px;
    font-weight: 900;
    color: #ffffff;
  }

  /* CTA button */
  .cta {
    display: block;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #e43f5a, #d63384);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s ease;
    box-shadow: 0 8px 30px rgba(228, 63, 90, 0.3);
    text-decoration: none;
  }

  .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(228, 63, 90, 0.45);
  }

  /* Bottom text */
  .guarantee {
    text-align: center;
    margin-top: 18px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .guarantee span {
    color: rgba(0, 210, 140, 0.7);
  }
</style>
</head>
<body>

<div class="banner">
  <div class="content">
    <!-- Top Badge -->
    <div class="badge">K-Beauty Chính Hãng</div>

    <!-- Product Name -->
    <h1 class="product-name">COSRX Advanced<br>Snail Mucin 96</h1>
    <p class="product-sub">Power Essence · 100ml</p>

    <!-- Price Comparison -->
    <div class="price-card">
      <div class="price-row">
        <span class="price-label">Giá Shopee</span>
        <span class="price-shopee">550.000đ</span>
      </div>
      <div class="price-row-main">
        <span class="price-label-main">Giá Shop</span>
        <span class="price-shop">420k</span>
      </div>
    </div>

    <!-- Savings -->
    <div class="savings">
      <div class="savings-icon">✓</div>
      <span class="savings-text">Tiết kiệm</span>
      <span class="savings-amount">130.000đ</span>
    </div>

    <!-- CTA -->
    <a href="#" class="cta">🛒 Mua Ngay</a>

    <!-- Guarantee -->
    <p class="guarantee"><span>✦</span> Hàng chính hãng 100% · Cam kết giá tốt nhất <span>✦</span></p>
  </div>
</div>

</body>
</html>

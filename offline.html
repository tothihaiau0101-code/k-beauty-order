<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - K-Beauty</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f13;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
        }
        h1 { color: #d63384; font-size: 2rem; margin-bottom: 1rem; }
        p { color: #a0a0a0; line-height: 1.5; margin-bottom: 2rem; }
        .btn {
            background-color: #d63384;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>You are offline</h1>
        <p>It seems your internet connection was lost. Please check your connection and try again to continue shopping for your favorite K-Beauty products.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>

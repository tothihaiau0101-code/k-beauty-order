<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tra Cứu Đơn Hàng — K-Beauty & K-Pop Order</title>
  <meta name="description" content="Tra cứu trạng thái đơn hàng K-Beauty & K-Pop Order bằng mã đơn hoặc số điện thoại.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    .track-container { max-width: 560px; margin: 0 auto; padding: 20px 16px; }
    .track-form { display: flex; gap: 8px; margin: 24px 0; }
    .track-form input {
      flex: 1; padding: 14px 18px; border-radius: 14px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-primary); font-family: inherit; font-size: 0.9rem; outline: none;
    }
    .track-form input:focus { border-color: var(--accent-purple); }
    .track-form button {
      padding: 14px 24px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer;
    }
    .track-result { display: none; margin-top: 24px; }
    .track-result.show { display: block; }
    .order-info {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px; margin-bottom: 20px;
    }
    .order-info h3 { font-family: 'Outfit', sans-serif; color: var(--accent-pink); margin: 0 0 12px; }
    .order-info p { color: var(--text-secondary); font-size: 0.85rem; margin: 6px 0; }
    .order-info strong { color: var(--text-primary); }
    .timeline { position: relative; padding-left: 32px; }
    .timeline::before {
      content: ''; position: absolute; left: 11px; top: 8px; bottom: 8px; width: 2px;
      background: rgba(255,255,255,0.06);
    }
    .timeline-step { position: relative; padding: 12px 0; }
    .timeline-dot {
      position: absolute; left: -32px; top: 14px; width: 22px; height: 22px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; border: 2px solid rgba(255,255,255,0.1); background: var(--bg-primary);
    }
    .timeline-dot.done { background: #10b981; border-color: #10b981; }
    .timeline-dot.active { background: #a855f7; border-color: #a855f7; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(168,85,247,0.4); } 50% { box-shadow: 0 0 0 8px rgba(168,85,247,0); } }
    .timeline-title { font-weight: 700; color: var(--text-primary); font-size: 0.88rem; }
    .timeline-title.done { color: #10b981; }
    .timeline-title.active { color: #a855f7; }
    .timeline-time { color: var(--text-secondary); font-size: 0.75rem; margin-top: 2px; }
    .no-result { text-align: center; color: var(--text-secondary); padding: 40px 20px; }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="catalog.html" class="nav-brand">🇰🇷 K-Beauty</a>
      <div class="nav-links">
        <a href="catalog.html">🧴 Catalog</a>
        <a href="order-form.html">📩 Đặt Hàng</a>
        <a href="tracking.html" class="active">📦 Tra Cứu</a>
        <a href="policy.html">📋 Chính Sách</a>
      </div>
    </div>
  </nav>

  <div class="track-container">
    <h1 style="font-family:'Outfit',sans-serif;font-size:1.6rem;font-weight:800;text-align:center;color:var(--text-primary);margin-top:20px;">📦 Tra Cứu Đơn Hàng</h1>
    <p style="text-align:center;color:var(--text-secondary);font-size:0.85rem;">Nhập mã đơn hoặc số điện thoại để xem trạng thái</p>

    <div class="track-form">
      <input type="text" id="trackInput" placeholder="Mã đơn (KB-XXXX) hoặc SĐT...">
      <button onclick="trackOrder()">🔍 Tra cứu</button>
    </div>

    <div id="trackResult" class="track-result"></div>
  </div>

  <footer style="text-align:center;padding:30px 16px;margin-top:40px;border-top:1px solid var(--border);">
    <div style="display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:10px;">
      <a href="catalog.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.78rem;">📦 Catalog</a>
      <a href="order-form.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.78rem;">📩 Đặt Hàng</a>
      <a href="tracking.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.78rem;">📦 Tra Cứu</a>
      <a href="policy.html" style="color:var(--text-secondary);text-decoration:none;font-size:0.78rem;">📋 Chính Sách</a>
    </div>
    <p style="font-size:0.72rem;color:var(--text-secondary);margin:0;">© 2025 K-Beauty & K-Pop Order. Made with 💜</p>
  </footer>

  <script>
    const DEMO_ORDERS = {
      'KB-A1B2': {
        id: 'KB-A1B2', name: 'Nguyễn Thị Lan', phone: '0901234567',
        items: 'COSRX Snail Mucin x1, BOJ Sun SPF50+ x1',
        total: '800,000₫', date: '2026-03-18', status: 2,
        steps: [
          { title: 'Đặt hàng', time: '18/03 — 14:30' },
          { title: 'Xác nhận', time: '18/03 — 16:00' },
          { title: 'Đang giao', time: '19/03 — 09:00' },
          { title: 'Hoàn thành', time: '' }
        ]
      },
      'KB-C3D4': {
        id: 'KB-C3D4', name: 'Trần Minh Anh', phone: '0912345678',
        items: 'Anua Heartleaf Toner x1, Romand Juicy Tint x2',
        total: '950,000₫', date: '2026-03-20', status: 3,
        steps: [
          { title: 'Đặt hàng', time: '20/03 — 10:15' },
          { title: 'Xác nhận', time: '20/03 — 11:00' },
          { title: 'Đang giao', time: '20/03 — 14:30' },
          { title: 'Hoàn thành', time: '21/03 — 09:00' }
        ]
      },
      'KB-E5F6': {
        id: 'KB-E5F6', name: 'Lê Hà My', phone: '0987654321',
        items: 'Combo Skincare Starter x1',
        total: '1,100,000₫', date: '2026-03-21', status: 0,
        steps: [
          { title: 'Đặt hàng', time: '21/03 — 15:00' },
          { title: 'Xác nhận', time: '' },
          { title: 'Đang giao', time: '' },
          { title: 'Hoàn thành', time: '' }
        ]
      }
    };

    function trackOrder() {
      const q = document.getElementById('trackInput').value.trim().toUpperCase();
      const el = document.getElementById('trackResult');
      if (!q) { el.className = 'track-result'; return; }
      let order = DEMO_ORDERS[q];
      if (!order) order = Object.values(DEMO_ORDERS).find(o => o.phone === q);
      if (!order) {
        el.innerHTML = '<div class="no-result">❌ Không tìm thấy đơn hàng.<br><span style="font-size:0.78rem;">Kiểm tra lại mã đơn hoặc SĐT.</span></div>';
        el.className = 'track-result show'; return;
      }
      const icons = ['📝', '✅', '🚚', '🎉'];
      let html = `<div class="order-info"><h3>Đơn hàng ${order.id}</h3><p><strong>Khách:</strong> ${order.name}</p><p><strong>SĐT:</strong> ${order.phone}</p><p><strong>Sản phẩm:</strong> ${order.items}</p><p><strong>Tổng:</strong> <span style="color:#ff5a92;font-weight:700;">${order.total}</span></p></div><div class="timeline">`;
      order.steps.forEach((step, i) => {
        const isDone = i < order.status, isActive = i === order.status;
        html += `<div class="timeline-step"><div class="timeline-dot ${isDone?'done':isActive?'active':''}">${icons[i]}</div><div class="timeline-title ${isDone?'done':isActive?'active':''}">${step.title}</div><div class="timeline-time">${step.time||(isActive?'Đang xử lý...':'—')}</div></div>`;
      });
      html += '</div>';
      el.innerHTML = html;
      el.className = 'track-result show';
    }
  </script>
</body>
</html>
